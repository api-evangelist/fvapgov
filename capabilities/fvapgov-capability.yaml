naftiko: 1.0.0-alpha2
info:
  label: FVAP.gov XML API
  description: The Federal Voting Assistance Program (FVAP) publishes XML feeds providing voter information by U.S. state
    and territory. Each jurisdiction exposes four datasets covering important info, deadline dates, ballot rules, and election
    offices, plus a combined electronic Voting Assistance Guide (eVAG).
  tags:
  - Fvapgov
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: fvapgov
    baseUri: https://www.fvap.gov
    description: FVAP.gov XML API HTTP API.
    resources:
    - name: xml-api-state-important-info-xml
      path: /xml-api/{state}/important-info.xml
      operations:
      - name: getimportantinfo
        method: GET
        description: Get important voting information for a state or territory.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: xml-api-state-deadline-dates-xml
      path: /xml-api/{state}/deadline-dates.xml
      operations:
      - name: getdeadlinedates
        method: GET
        description: Get deadline dates for a state or territory.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: xml-api-state-ballot-rules-xml
      path: /xml-api/{state}/ballot-rules.xml
      operations:
      - name: getballotrules
        method: GET
        description: Get ballot rules for a state or territory.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: xml-api-state-election-offices-xml
      path: /xml-api/{state}/election-offices.xml
      operations:
      - name: getelectionoffices
        method: GET
        description: Get election offices for a state or territory.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: xml-api-state-evag-xml
      path: /xml-api/{state}/evag.xml
      operations:
      - name: getevag
        method: GET
        description: Get the combined eVAG feed for a state or territory.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: xml-api-api-schema-xsd
      path: /xml-api/api-schema.xsd
      operations:
      - name: getapischema
        method: GET
        description: Get the XML schema definition for the FVAP feeds.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: fvapgov-rest
    description: REST adapter for FVAP.gov XML API.
    resources:
    - path: /xml-api/{state}/important-info.xml
      name: getimportantinfo
      operations:
      - method: GET
        name: getimportantinfo
        description: Get important voting information for a state or territory.
        call: fvapgov.getimportantinfo
        outputParameters:
        - type: object
          mapping: $.
    - path: /xml-api/{state}/deadline-dates.xml
      name: getdeadlinedates
      operations:
      - method: GET
        name: getdeadlinedates
        description: Get deadline dates for a state or territory.
        call: fvapgov.getdeadlinedates
        outputParameters:
        - type: object
          mapping: $.
    - path: /xml-api/{state}/ballot-rules.xml
      name: getballotrules
      operations:
      - method: GET
        name: getballotrules
        description: Get ballot rules for a state or territory.
        call: fvapgov.getballotrules
        outputParameters:
        - type: object
          mapping: $.
    - path: /xml-api/{state}/election-offices.xml
      name: getelectionoffices
      operations:
      - method: GET
        name: getelectionoffices
        description: Get election offices for a state or territory.
        call: fvapgov.getelectionoffices
        outputParameters:
        - type: object
          mapping: $.
    - path: /xml-api/{state}/evag.xml
      name: getevag
      operations:
      - method: GET
        name: getevag
        description: Get the combined eVAG feed for a state or territory.
        call: fvapgov.getevag
        outputParameters:
        - type: object
          mapping: $.
    - path: /xml-api/api-schema.xsd
      name: getapischema
      operations:
      - method: GET
        name: getapischema
        description: Get the XML schema definition for the FVAP feeds.
        call: fvapgov.getapischema
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: fvapgov-mcp
    transport: http
    description: MCP adapter for FVAP.gov XML API for AI agent use.
    tools:
    - name: getimportantinfo
      description: Get important voting information for a state or territory.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: fvapgov.getimportantinfo
      outputParameters:
      - type: object
        mapping: $.
    - name: getdeadlinedates
      description: Get deadline dates for a state or territory.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: fvapgov.getdeadlinedates
      outputParameters:
      - type: object
        mapping: $.
    - name: getballotrules
      description: Get ballot rules for a state or territory.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: fvapgov.getballotrules
      outputParameters:
      - type: object
        mapping: $.
    - name: getelectionoffices
      description: Get election offices for a state or territory.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: fvapgov.getelectionoffices
      outputParameters:
      - type: object
        mapping: $.
    - name: getevag
      description: Get the combined eVAG feed for a state or territory.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: fvapgov.getevag
      outputParameters:
      - type: object
        mapping: $.
    - name: getapischema
      description: Get the XML schema definition for the FVAP feeds.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: fvapgov.getapischema
      outputParameters:
      - type: object
        mapping: $.
